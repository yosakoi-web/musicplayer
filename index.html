<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b8f87" />
    <meta
      name="description"
      content="練習時に端末内の音源を選んで再生する、シンプルな音楽プレーヤー"
    />
    <title>練習用音楽プレーヤー</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">TEAM PRACTICE</p>
          <h1>練習用音楽プレーヤー</h1>
        </div>
        <span class="privacy-label">チーム練習用</span>
      </header>

      <section class="source-panel source-panel-ready" aria-labelledby="source-heading">
        <div class="source-copy">
          <p class="source-kicker">PLAYER READY</p>
          <h2 id="source-heading">全12曲を再生できます</h2>
          <p class="load-status is-ready">下の曲ボタンを押すと再生が始まります</p>
        </div>
        <div class="ready-mark" aria-hidden="true">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m5 12.5 4.2 4.2L19.5 6.5" />
          </svg>
          <span>準備完了</span>
        </div>
      </section>

      <section class="tracks-section" aria-labelledby="tracks-heading">
        <div class="section-heading">
          <h2 id="tracks-heading">曲目</h2>
          <span class="loaded-count">12 / 12 曲</span>
        </div>
        <div id="track-grid" class="track-grid"></div>
      </section>
    </main>

    <div id="player-layer" class="player-layer" hidden>
      <button id="modal-backdrop" class="modal-backdrop" type="button" aria-label="再生画面を閉じる"></button>
      <section
        id="player-dialog"
        class="player-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="now-playing-title"
      >
        <button id="close-player" class="close-button" type="button" aria-label="閉じる">
          <span aria-hidden="true">×</span>
        </button>

        <p class="now-playing-label">再生中</p>
        <h2 id="now-playing-title">曲名</h2>

        <button id="play-toggle" class="play-toggle" type="button" aria-label="一時停止">
          <svg class="pause-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M7 5.5h3.5v13H7zM13.5 5.5H17v13h-3.5z" />
          </svg>
          <svg class="play-icon" aria-hidden="true" viewBox="0 0 24 24" hidden>
            <path d="m8 5 11 7-11 7V5Z" />
          </svg>
        </button>

        <div class="seek-area">
          <label for="seek-bar" class="visually-hidden">再生位置</label>
          <input id="seek-bar" type="range" min="0" max="100" step="0.1" value="0" disabled />
          <div class="time-row" aria-live="off">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>

        <p id="player-message" class="player-message" aria-live="polite"></p>
        <audio id="audio-player" preload="auto"></audio>
      </section>
    </div>

    <noscript>このアプリを使用するにはJavaScriptを有効にしてください。</noscript>
  </body>
</html>
